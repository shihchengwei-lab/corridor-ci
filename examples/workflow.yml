name: Corridor CI

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  corridor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: shihchengwei-lab/corridor-ci@v9
        with:
          mode: warn
          small_change_max_files: 1
          max_changed_files: 12
