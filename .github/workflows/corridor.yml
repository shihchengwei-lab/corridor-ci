name: Corridor CI

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  review-packet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./
        with:
          mode: warn
          source: body
          max_changed_files: 12
